<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        .test-button {
            background: #006C75;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .test-button:hover {
            background: #005560;
        }
        #output {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>Button Click Test</h1>
    <p>If these buttons work, the issue is with React, not basic JavaScript:</p>
    
    <button class="test-button" onclick="testClick('Button 1')">Test Button 1</button>
    <button class="test-button" onclick="testClick('Button 2')">Test Button 2</button>
    <button class="test-button" onclick="testClick('Button 3')">Test Button 3</button>
    
    <div id="output">
        <strong>Click count: <span id="count">0</span></strong>
        <div id="log"></div>
    </div>

    <script>
        let clickCount = 0;
        
        function testClick(buttonName) {
            clickCount++;
            document.getElementById('count').textContent = clickCount;
            
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `${new Date().toLocaleTimeString()}: ${buttonName} clicked!`;
            entry.style.padding = '5px';
            entry.style.borderBottom = '1px solid #eee';
            log.insertBefore(entry, log.firstChild);
            
            console.log(`${buttonName} was clicked!`);
        }
    </script>
</body>
</html>
