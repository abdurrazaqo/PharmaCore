
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#006C75">
    <link rel="icon" type="image/png" href="/images/favicon.PNG">
    <link rel="apple-touch-icon" href="/images/favicon.PNG">
    <title>PharmaCore</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/images/logo.PNG" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        /* Prevent icon flash by setting default font */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'liga';
        }
        /* Prevent layout shift during load */
        body {
            opacity: 0;
            transition: opacity 0.15s ease-in;
        }
        body.loaded {
            opacity: 1;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006C75",
                        "background-light": "#f8fafc",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica Neue", "Arial", "sans-serif"]
                    },
                    fontSize: {
                        'xs': '0.7rem',
                        'sm': '0.8rem',
                        'base': '0.875rem',
                        'lg': '1rem',
                        'xl': '1.125rem',
                        '2xl': '1.375rem',
                        '3xl': '1.75rem',
                        '4xl': '2rem',
                    }
                },
            },
        }
    </script>
    <script>
        // Mark body as loaded once fonts are ready
        if (document.fonts) {
            document.fonts.ready.then(() => {
                document.body.classList.add('loaded');
            });
        } else {
            // Fallback for browsers without Font Loading API
            window.addEventListener('load', () => {
                document.body.classList.add('loaded');
            });
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
        }
        
        /* Remove number input arrows globally */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        
        /* Prevent zoom on input focus (iOS Safari) */
        input, textarea, select {
            font-size: 16px !important;
        }
        
        .material-symbols-outlined { 
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        
        /* Dark mode improvements */
        .dark {
            color-scheme: dark;
        }
        .dark body {
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #404040; }
        
        /* Safe area support */
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Smooth animations */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Touch-friendly ripple effect */
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        /* Modal overlay fix - ensure modals cover entire viewport */
        .modal-overlay {
            position: fixed !important;
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            min-height: 100vh !important;
            height: 100dvh !important; /* Dynamic viewport height for mobile */
            z-index: 99999 !important;
            margin: 0 !important;
            overflow-y: auto !important;
        }
        
        .modal-content {
            position: relative !important;
            z-index: 100000 !important;
            margin: auto !important;
        }
        
        /* Force all elements below modals */
        body:has(.modal-overlay) > #root {
            position: relative !important;
            z-index: 1 !important;
        }
        
        body:has(.modal-overlay) header,
        body:has(.modal-overlay) aside,
        body:has(.modal-overlay) main {
            z-index: 1 !important;
        }
        
        /* Hamburger menu overlay fix */
        .menu-overlay {
            position: fixed !important;
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            min-height: 100vh !important;
            height: 100dvh !important;
            z-index: 9998 !important;
        }
        
        .menu-drawer {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            bottom: 0 !important;
            height: 100vh !important;
            min-height: 100vh !important;
            height: 100dvh !important;
            max-height: 100vh !important;
            max-height: 100dvh !important;
            z-index: 9999 !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
